<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jack in the Box</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            padding: 2rem;
        }
        .login-card {
            background: white;
            border-radius: 25px;
            padding: 3rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        .login-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .login-card h1 {
            font-family: var(--font-title);
            font-size: 2rem;
            color: var(--color-text);
            margin-bottom: 0.5rem;
        }
        .login-card p {
            color: var(--color-text-light);
            margin-bottom: 2rem;
        }
        .login-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid var(--color-bg);
            border-radius: 15px;
            font-size: 1rem;
            font-family: var(--font-body);
            margin-bottom: 1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .login-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            background: var(--color-primary-dark);
            transform: translateY(-2px);
        }
        .login-error {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }
        .login-back {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--color-text-light);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .login-back:hover {
            color: var(--color-primary);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-icon"></div>
            <h1>Acceso Restringido</h1>
            <p>Ingresa la contraseña para continuar</p>
            <input type="password" class="login-input" id="passwordInput" placeholder="Contraseña" autocomplete="off">
            <button class="login-btn" id="loginBtn">Ingresar</button>
            <p class="login-error" id="loginError">Contraseña incorrecta</p>
            <a href="index.html" class="login-back">← Volver al inicio</a>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        function handleLogin() {
            if (login(passwordInput.value)) {
                const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
                window.location.href = redirect + '?auth=true';
            } else {
                loginError.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        passwordInput.focus();
    </script>
</body>
</html>
